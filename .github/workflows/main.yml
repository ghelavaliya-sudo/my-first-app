name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Capacitor and Setup
        run: |
          mkdir www
          cp -r * www/ || true
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init MyApp com.myfact.app --web-dir www
          npx cap add android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
